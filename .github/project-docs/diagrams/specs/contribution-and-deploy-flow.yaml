title: Content Contribution And Deploy Flow
direction: LR
clusters:
  - id: authoring
    label: Authoring
  - id: validation
    label: Validation And Triggering
  - id: build
    label: Site Build
  - id: publish
    label: Publish Outputs
nodes:
  - id: contributor
    label: Contributor
    cluster: authoring
  - id: content_repo
    label: content repo markdown
    cluster: authoring
  - id: validator
    label: validate_content.py
    cluster: validation
  - id: trigger_sites
    label: trigger-sites.yml
    cluster: validation
  - id: dispatch_payload
    label: repository_dispatch payload
    cluster: validation
  - id: site_workflow
    label: wikip.co generator.yml
    cluster: build
  - id: reusable_workflow
    label: hexo-deploy.yml
    cluster: build
  - id: resolve_sha
    label: resolve exact content SHA
    cluster: build
  - id: restore_mtimes
    label: restore mtimes from git history
    cluster: build
  - id: hexo_build
    label: npm clean + build
    cluster: build
  - id: public_repo
    label: public repo
    cluster: publish
  - id: dockerhub
    label: Docker Hub
    cluster: publish
  - id: email
    label: email notification
    cluster: publish
edges:
  - from: contributor
    to: content_repo
    label: edit / commit / push
  - from: content_repo
    to: validator
    label: local or CI validation
  - from: content_repo
    to: trigger_sites
    label: push to main
  - from: trigger_sites
    to: dispatch_payload
    label: include ref + sha
  - from: dispatch_payload
    to: site_workflow
    label: content-updated event
  - from: site_workflow
    to: reusable_workflow
    label: workflow_call
  - from: reusable_workflow
    to: resolve_sha
    label: detach content submodule
  - from: resolve_sha
    to: restore_mtimes
    label: content tree ready
  - from: restore_mtimes
    to: hexo_build
    label: correct updated timestamps
  - from: hexo_build
    to: public_repo
    label: commit generated static files
  - from: hexo_build
    to: dockerhub
    label: optional container image
  - from: reusable_workflow
    to: email
    label: run status
