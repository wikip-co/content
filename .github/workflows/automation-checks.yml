name: Automation Checks

on:
  pull_request:
    paths:
      - '.github/**'
      - 'agent-workflow'
  push:
    branches:
      - main
    paths:
      - '.github/**'
      - 'agent-workflow'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: rhysd/actionlint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  tooling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v6

      - name: Compile Python sources
        run: python3 -m py_compile .github/scripts/validate_content.py .github/agent-tools/wiki-automation/wiki_automation/*.py .github/agent-tools/gmail-reader/gmail_reader/*.py .github/agent-tools/image-upload/image_upload/*.py .github/agent-tools/web-scraper/main.py

      - name: Run wiki-automation tests
        run: uv run --with pytest --directory .github/agent-tools/wiki-automation pytest -q tests

      - name: Smoke test agent CLIs
        run: |
          ./agent-workflow help
          ./agent-workflow validate --format json
          uv run --directory .github/agent-tools/wiki-automation wiki-automation --help
          uv run --directory .github/agent-tools/gmail-reader gmail-reader --help
          uv run --directory .github/agent-tools/image-upload image-upload --help
          uv run --directory .github/agent-tools/web-scraper main.py --help
