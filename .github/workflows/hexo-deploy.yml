name: Hexo Build and Deploy

on:
  workflow_call:
    inputs:
      site_name:
        type: string
        required: true
      branch:
        type: string
        required: true
      content_ref:
        type: string
        required: false
        default: main
      content_sha:
        type: string
        required: false
        default: ''
      enable_docker:
        type: boolean
        default: false
      enable_encryption:
        type: boolean
        default: false
    secrets:
      GIT_TOKEN:
        required: true
      BLOG_ENCRYPT_PASSWORD:
        required: false
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}
          fetch-depth: 1
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure Git
        run: |
          git config --global user.email "me@anthonyrussano.com"
          git config --global user.name "Anthony Russano"
          git config --global url."https://x-access-token:${{ secrets.GIT_TOKEN }}@github.com/".insteadOf https://github.com/

      - name: Sync submodules
        run: |
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --depth 1 public
          git -c protocol.version=2 submodule update --init site/source/_posts

      - name: Resolve content revision
        if: inputs.content_sha != ''
        run: |
          git -C site/source/_posts fetch --no-tags origin "${{ inputs.content_ref }}"
          git -C site/source/_posts checkout --detach "${{ inputs.content_sha }}"

      - name: Install site dependencies
        run: npm ci --prefix site

      - name: Restore content mtimes from Git history
        run: |
          git -C site/source/_posts ls-files -z '*.md' | while IFS= read -r -d '' file; do
            ts="$(git -C site/source/_posts log -1 --format=%ct -- "$file")"
            touch -d "@${ts}" "site/source/_posts/${file}"
          done

      - name: Validate content
        run: python3 site/source/_posts/.github/scripts/validate_content.py --repo-root site/source/_posts

      - name: Prepare public branch
        run: |
          git -C public fetch origin "${{ inputs.branch }}"
          if git -C public show-ref --verify --quiet "refs/heads/${{ inputs.branch }}"; then
            git -C public checkout "${{ inputs.branch }}"
          else
            git -C public checkout -b "${{ inputs.branch }}" "origin/${{ inputs.branch }}"
          fi
          git -C public pull --ff-only origin "${{ inputs.branch }}"

      - name: Inject encryption passwords
        if: inputs.enable_encryption
        run: |
          find site/source/_posts -type f -name "*.md" -exec sh -c '
            if grep -q "^encrypted: true" "$1"; then
              sed -i "/^encrypted:/a password: ${{ secrets.BLOG_ENCRYPT_PASSWORD }}" "$1"
            fi
          ' sh {} \;

      - name: Build site
        env:
          NODE_OPTIONS: --max-old-space-size=5168
        run: |
          PUBLIC_GITFILE="$RUNNER_TEMP/public.git"
          cp public/.git "$PUBLIC_GITFILE"
          npm --prefix site run clean
          mkdir -p public
          cp "$PUBLIC_GITFILE" public/.git
          npm --prefix site run build

      - name: Publish generated site
        run: |
          git -C public add --all
          if git -C public diff --cached --quiet; then
            echo "No public changes to publish."
            exit 0
          fi
          git -C public commit -m "workflow publish: ${GITHUB_SHA}"
          git -C public push origin "${{ inputs.branch }}"

      - name: Prepare Docker Image
        if: inputs.enable_docker
        id: prep
        run: |
          DOCKER_IMAGE=${{ secrets.DOCKER_USERNAME }}/${GITHUB_REPOSITORY#*/}
          echo "tags=${DOCKER_IMAGE}:latest" >> "$GITHUB_OUTPUT"
          echo "docker_image=${DOCKER_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: inputs.enable_docker
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        if: inputs.enable_docker
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: inputs.enable_docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        if: inputs.enable_docker
        id: docker-build
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.prep.outputs.tags }}

